function buildMts(){
  MTS=[];
  [{y:.28,h:.26,sd:0,a:.03,sp:.004,d:6,r:168,g:164,b:158},
   {y:.36,h:.22,sd:35,a:.05,sp:.007,d:6,r:152,g:148,b:142},
   {y:.44,h:.18,sd:80,a:.08,sp:.012,d:5,r:128,g:124,b:118},
   {y:.52,h:.15,sd:140,a:.12,sp:.018,d:5,r:100,g:96,b:90},
   {y:.60,h:.12,sd:220,a:.18,sp:.028,d:4,r:70,g:67,b:62},
   {y:.68,h:.08,sd:360,a:.26,sp:.042,d:3,r:38,g:36,b:32}
  ].forEach(function(c){
    var pts=[],steps=Math.ceil(W/2)+1;
    for(var i=0;i<=steps;i++){
      var v=fbm(c.sd+i*.04,c.d);
      var pk=Math.pow(Math.max(0,Math.sin(i*.09+c.sd*.07)-.25),2)*1.8;
      pts.push(v+pk);
    }
    c.pts=pts;c.steps=steps;MTS.push(c);
  });
}
buildMts();addEventListener('resize',buildMts);

function drawMts(){
  MTS.forEach(function(m,idx){
    var by=H*m.y,dr=Math.sin(t*m.sp)*4;
    X.beginPath();X.moveTo(-5,H);
    for(var i=0;i<=m.steps;i++)
      X.lineTo((i/m.steps)*W+dr,by-m.pts[i]*H*m.h);
    X.lineTo(W+5,H);X.closePath();
    var g=X.createLinearGradient(0,by-H*m.h*.8,0,by+H*.15);
    g.addColorStop(0,'rgba('+m.r+','+m.g+','+m.b+','+m.a+')');
    g.addColorStop(.4,'rgba('+m.r+','+m.g+','+m.b+','+(m.a*.7)+')');
    g.addColorStop(1,'rgba('+m.r+','+m.g+','+m.b+','+(m.a*.2)+')');
    X.fillStyle=g;X.fill();
    if(idx>=2&&idx<=4)drawRidgePines(m,by,dr,idx);
  });
}

function drawRidgePines(m,by,dr,idx){
  var a=idx===2?.04:idx===3?.08:.14;
  var sz=idx===2?18:idx===3?28:22;
  var step=Math.floor(m.steps*.12);
  for(var i=step;i<m.steps-step;i+=Math.floor(m.steps*.08)+idx*3){
    var px=(i/m.steps)*W+dr;
    var py=by-m.pts[i]*H*m.h;
    drawPine(px,py,sz+Math.sin(i*2.3)*8,a);
  }
}

function drawPine(px,py,sz,a){
  X.fillStyle='rgba(15,14,20,'+a+')';
  X.fillRect(px-sz*.025,py-sz*.55,sz*.05,sz*.55);
  for(var i=0;i<4;i++){
    var ly=py-sz*(.15+i*.2);
    var lw=sz*(.32-i*.05);
    var lh=sz*.14;
    X.beginPath();X.moveTo(px,ly-lh);
    X.lineTo(px-lw,ly+2);X.lineTo(px+lw,ly+2);
    X.closePath();X.fill();
  }
}

/* -------- DARK DEBRIS -------- */
var DB=[];for(var i=0;i<80;i++)DB.push(mkD(1));
function mkD(init){
  var big=Math.random()>.65;
  return{
    x:init?Math.random()*2000:W*.48+Math.random()*W*.28,
    y:init?Math.random()*2000:H*.12+Math.random()*H*.65,
    w:big?3+Math.random()*8:1+Math.random()*2.5,
    h:big?1+Math.random()*2.5:.3+Math.random()*1,
    vx:-1+Math.random()*4.8,vy:-.7+Math.random()*2.4,
    rot:Math.random()*6.3,vr:(Math.random()-.5)*.16,
    a:big?.22+Math.random()*.32:.08+Math.random()*.18,
    life:.5+Math.random()*.5
  };
}
function drawDebris(){
  for(var i=0;i<DB.length;i++){
    var d=DB[i];d.x+=d.vx;d.y+=d.vy+Math.sin(t*2+i)*.35;d.rot+=d.vr;d.life-=.001;
    if(d.x<-30||d.x>W+30||d.y<-30||d.y>H+30||d.life<=0){DB[i]=mkD(0);continue;}
    X.save();X.translate(d.x,d.y);X.rotate(d.rot);
    X.globalAlpha=d.a*d.life;
    X.fillStyle='rgba(16,16,24,0.9)';
    X.fillRect(-d.w/2,-d.h/2,d.w,d.h);
    X.restore();
  }
  X.globalAlpha=1;
}

/* -------- INK SPLATTERS -------- */
var ISP=[];
function drawInkSplat(){
  if(Math.random()<.005&&ISP.length<4){
    var sx=W*.5+Math.random()*W*.25,sy=H*.25+Math.random()*H*.45,dr=[];
    for(var j=0;j<5+Math.floor(Math.random()*7);j++){
      var a=Math.random()*6.3,spd=.5+Math.random()*2.2;
      dr.push({x:sx,y:sy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:1.5+Math.random()*6,a:.10+Math.random()*.13});
    }
    ISP.push({dr:dr,life:1,dec:.004+Math.random()*.006});
  }
  for(var i=ISP.length-1;i>=0;i--){
    var s=ISP[i];s.life-=s.dec;
    if(s.life<=0){ISP.splice(i,1);continue;}
    s.dr.forEach(function(d){
      d.x+=d.vx;d.y+=d.vy;d.vx*=.97;d.vy*=.97;
      X.globalAlpha=s.life*d.a;
      X.beginPath();X.arc(d.x,d.y,d.r*s.life,0,6.3);
      X.fillStyle='rgba(16,16,24,0.85)';X.fill();
    });
  }
  X.globalAlpha=1;
}

// ================= CORE LOGIC =================
function getTrigramIndex(l1,l2,l3){ return (l3<<2)|(l2<<1)|l1; }

function calcHexagram(lines){
  const vals = lines.map(l=>l.value);
  const lower = getTrigramIndex(vals[0]&1, vals[1]&1, vals[2]&1);
  const upper = getTrigramIndex(vals[3]&1, vals[4]&1, vals[5]&1);
  const key = lower+'_'+upper;
  const movingLines = [];
  lines.forEach((l,i)=>{ if(l.moving) movingLines.push(i); });
  let changedKey = null;
  if(movingLines.length > 0){
    const changed = vals.map((v,i)=> lines[i].moving ? (v&1?0:1) : (v&1));
    const cL = getTrigramIndex(changed[0], changed[1], changed[2]);
    const cU = getTrigramIndex(changed[3], changed[4], changed[5]);
    changedKey = cL+'_'+cU;
  }
  return { key, changedKey, movingLines, lower, upper };
}

function tossCoin(){ return Math.random() < 0.5 ? 3 : 2; }
function tossThreeCoins(){
  const c = [tossCoin(), tossCoin(), tossCoin()];
  const sum = c[0]+c[1]+c[2];
  return { coins:c, sum, value:(sum===6||sum===8)?0:1, isYang:sum===7||sum===9, moving:sum===6||sum===9 };
}

// ================= UI LOGIC =================
function goToStage(name){
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('stage-'+name);
  el.classList.add('active');
  document.getElementById('app').scrollTop = 0;
  sfxTransition();
  if(name==='casting') initCasting();
  if(name==='reveal'){ buildReveal(); sfxReveal(); }
  if(name==='result') buildResult();
  if(name==='history') buildHistoryList();
  if(name==='incense') initIncense();
}

function selectCat(el){
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  state.category = el.dataset.cat;
  document.getElementById('questionArea').classList.add('show');
  var btn = document.getElementById('btnConfirmCat');
  btn.classList.remove('btn-disabled');
  btn.classList.add('btn-enabled');
}
function confirmCat(){
  if(!state.category) return;
  state.question = (document.getElementById('questionInput').value||'').trim();
  goToStage('casting');
}

function initCasting(){
  state.round=0; state.lines=[]; state.casting=false;
  var d = DEITY[state.category];
  if(d) document.getElementById('deityPray').textContent = '— '+d.pray+' —';
  buildTokens();
  document.getElementById('castRound').textContent = ROUND_NAMES[0];
  document.getElementById('yaoProgress').innerHTML = '';
  document.getElementById('castResult').classList.remove('show');
  document.getElementById('castResult').textContent = '';
  document.getElementById('btnCast').style.display = '';
  document.getElementById('btnQuickCast').style.display = '';
  const extra = document.querySelector('#stage-casting .btn-small.view-result-btn');
  if(extra) extra.remove();
}

function buildTokens(){
  var area = document.getElementById('tokensArea');
  var cat = state.category;
  var d = DEITY[cat];
  var src = TOKEN_IMG[cat] || '';
  var html = '';
  for(var i=0;i<3;i++){
    html += '<div class="token" id="token'+i+'"><img src="'+src+'" alt=""></div>';
  }
  area.innerHTML = html;
  document.getElementById('objLabel').textContent = d ? d.obj.label : '';
}

function resetTokens(){
  for(var i=0;i<3;i++){
    var t = document.getElementById('token'+i);
    if(!t) continue;
    t.style.animation = 'none';
    t.style.animationDelay = '';
    void t.offsetHeight;
    t.classList.remove('yang-result','yin-result');
  }
  document.getElementById('castResult').classList.remove('show');
}

function castCoins(){
  if(state.casting || state.round >= 6) return;
  state.casting = true;
  document.getElementById('btnQuickCast').style.display = 'none';
  resetTokens();
  var result = tossThreeCoins();
  var d = DEITY[state.category];
  var animName = d ? d.obj.anim : 'castGeneral';
  sfxCoinToss();
  for(var i=0;i<3;i++){
    var t = document.getElementById('token'+i);
    t.style.animationDelay = (i*100)+'ms';
    t.style.animation = animName+' 1.2s cubic-bezier(0.22,1,0.36,1) forwards';
  }
  setTimeout(function(){
    sfxCoinLand();
    for(var i=0;i<3;i++){
      var t = document.getElementById('token'+i);
      t.classList.add(result.coins[i]===3 ? 'yang-result' : 'yin-result');
    }
    state.lines.push(result);
    state.round++;
    var resultEl = document.getElementById('castResult');
    var heads = result.coins.filter(function(c){return c===3;}).length;
    var typeStr = '';
    if(result.sum===6) typeStr = '老阴 ⚋  动爻·变阳';
    else if(result.sum===7) typeStr = '少阳 ⚊';
    else if(result.sum===8) typeStr = '少阴 ⚋';
    else typeStr = '老阳 ⚊  动爻·变阴';
    resultEl.textContent = heads+'阳'+(3-heads)+'阴 · '+typeStr;
    resultEl.classList.add('show');
    addYaoLine(result, state.round);
    if(state.round < 6){
      document.getElementById('castRound').textContent = ROUND_NAMES[state.round];
      state.casting = false;
    } else {
      showCastComplete();
    }
  }, 1500);
}

function showCastComplete(){
  document.getElementById('btnCast').style.display = 'none';
  document.getElementById('btnQuickCast').style.display = 'none';
  setTimeout(function(){
    document.getElementById('castRound').textContent = '摇 卦 完 成';
    var btn = document.createElement('button');
    btn.className = 'btn btn-small view-result-btn';
    btn.textContent = '查看卦象';
    btn.onclick = function(){ goToStage('reveal'); };
    document.querySelector('.cast-btns').appendChild(btn);
    state.casting = false;
  }, 500);
}

function quickCast(){
  if(state.casting || state.round >= 6) return;
  state.casting = true;
  document.getElementById('btnCast').style.display = 'none';
  document.getElementById('btnQuickCast').style.display = 'none';

  for(var i=0;i<6;i++) state.lines.push(tossThreeCoins());

  var d = DEITY[state.category];
  var animName = d ? d.obj.anim : 'castGeneral';
  var step = 0;
  function showNext(){
    if(step >= 6){
      state.round = 6;
      showCastComplete();
      return;
    }
    resetTokens();
    var result = state.lines[step];
    sfxCoinToss();
    for(var i=0;i<3;i++){
      var t = document.getElementById('token'+i);
      t.style.animationDelay = (i*60)+'ms';
      t.style.animation = animName+' 0.6s cubic-bezier(0.22,1,0.36,1) forwards';
    }
    setTimeout(function(){
      sfxCoinLand();
      for(var j=0;j<3;j++){
        var tk = document.getElementById('token'+j);
        tk.classList.add(result.coins[j]===3?'yang-result':'yin-result');
      }
      state.round = step + 1;
      document.getElementById('castRound').textContent = ROUND_NAMES[Math.min(step, 5)];
      var resultEl = document.getElementById('castResult');
      var heads = result.coins.filter(function(c){return c===3;}).length;
      var typeStr = '';
      if(result.sum===6) typeStr = '老阴 ⚋  动爻·变阳';
      else if(result.sum===7) typeStr = '少阳 ⚊';
      else if(result.sum===8) typeStr = '少阴 ⚋';
      else typeStr = '老阳 ⚊  动爻·变阴';
      resultEl.textContent = heads+'阳'+(3-heads)+'阴 · '+typeStr;
      resultEl.classList.add('show');
      addYaoLine(result, step + 1);
      step++;
      setTimeout(showNext, 350);
    }, 700);
  }
  showNext();
}

function addYaoLine(result, round){
  const container = document.getElementById('yaoProgress');
  const div = document.createElement('div');
  div.className = 'yao-line';
  const numSpan = document.createElement('span');
  numSpan.className = 'yao-num';
  numSpan.textContent = ['初','二','三','四','五','上'][round-1];
  div.appendChild(numSpan);
  if(result.isYang){
    const bar = document.createElement('div');
    bar.className = 'yang' + (result.moving?' moving':'');
    div.appendChild(bar);
  } else {
    const yin = document.createElement('div');
    yin.className = 'yin' + (result.moving?' moving':'');
    yin.innerHTML = '<span></span><span></span>';
    div.appendChild(yin);
  }
  const dot = document.createElement('span');
  dot.className = result.moving ? 'moving-dot' : 'stable-dot';
  div.appendChild(dot);
  container.appendChild(div);
}

function buildReveal(){
  const hex = calcHexagram(state.lines);
  const data = H[hex.key];
  if(!data) return;
  const hasChanged = hex.changedKey && H[hex.changedKey];
  const changedData = hasChanged ? H[hex.changedKey] : null;
  const deity = DEITY[state.category]||{};
  let html = `<div class="cat-title" style="margin-bottom:4px">卦 象</div>
    <div class="cat-sub">${CAT_NAMES[state.category]}占${deity.name?' · '+deity.name+'指引':''}</div><div class="divider"></div>`;
  html += `<div class="gua-display">`;
  html += buildGuaBox('本卦', data, hex.key, state.lines, false);
  if(hasChanged){
    html += `<div class="arrow">➜</div>`;
    const cLines = state.lines.map(l=>({...l,
      value: l.moving?(l.value&1?0:1):l.value,
      isYang: l.moving?!l.isYang:l.isYang, moving:false}));
    html += buildGuaBox('变卦', changedData, hex.changedKey, cLines, true);
  }
  html += `</div>`;
  html += `<div class="gua-xiang">象曰：${data[4]}</div>`;
  document.getElementById('revealContent').innerHTML = html;
}

function buildGuaBox(label, data, key, lines, isChanged){
  const parts = key.split('_');
  const lower = parseInt(parts[0]), upper = parseInt(parts[1]);
  let html = `<div class="gua-box"><div class="gua-label">${label}</div>
    <div class="gua-name">${data[1]}</div>
    <div class="gua-fullname">${data[2]}</div><div class="gua-lines">`;
  for(let i=0;i<6;i++){
    const isYang = lines[i].isYang || (lines[i].value&1)===1;
    const m = !isChanged && lines[i].moving;
    if(isYang) html += `<div class="yang${m?' moving':''}"></div>`;
    else html += `<div class="yin${m?' moving':''}"><span></span><span></span></div>`;
  }
  html += `</div><div class="tri-label">上${TRI[upper].nat}${TRI[upper].name} · 下${TRI[lower].nat}${TRI[lower].name}</div></div>`;
  return html;
}

function genBriefReading(cat, fortune, questionRaw, rawReading){
  var qDisp = questionRaw ? esc(questionRaw) : '';

  var tier = fortune<=2 ? 't2' : fortune===3 ? 't3' : fortune===4 ? 't4' : fortune===5 ? 't5' : 't6';
  var tmpl = pickSmartVariant(TEXT_POOLS.briefRead[tier], questionRaw||'');
  return opener + tmpl.replace(/\{CORE\}/g, rawReading);
}

function genBriefSummary(fortune, movingCount, changedData, questionRaw){
  var tier = fortune<=2 ? 't2' : fortune===3 ? 't3' : fortune===4 ? 't4' : fortune===5 ? 't5' : 't6';
  var s = pickSmartVariant(TEXT_POOLS.briefSum[tier], questionRaw||'');
  if(movingCount>0){
    s += ' 对了，你的卦里有动爻，说明事情还在变化中';
    if(changedData){var cf=changedData[7];
      if(cf<fortune) s += '——好消息是变化的方向是向好的，后面会比现在更顺。';
      else if(cf>fortune) s += '——提醒你趁现在还不错的时候多做准备，后面可能会有些波动。';
      else s += '，但整体趋势比较稳定，不用太操心。';

  } else { s += ' 而且卦象没有动爻，说明局面比较稳定，不会突然出什么岔子，按计划来就行。'; }
  return s;
}

function genCatAdvice(cat, fortune, movingCount, questionRaw){
  var tier = fortune<=2 ? 't2' : fortune===3 ? 't3' : fortune===4 ? 't4' : fortune===5 ? 't5' : 't6';
  var pool = TEXT_POOLS.cat[cat] && TEXT_POOLS.cat[cat][tier];
  if(!pool) return '';
  var qRef = questionRaw ? '关于"'+esc(questionRaw)+'"这件事，' : '';
  var r = qRef + pickSmartVariant(pool, questionRaw||'');
  if(movingCount>0) r += '<br><br>另外，你的卦里有动爻，说明这件事还在发展变化中——现在的状态不是最终结果，保持灵活，根据实际情况随时调整策略。';
  return r;
}

function genDetailedSummary(fortune, movingCount, changedData, cat, questionRaw){
  var tier = fortune<=2 ? 't2' : fortune===3 ? 't3' : fortune===4 ? 't4' : fortune===5 ? 't5' : 't6';
  return pickSmartVariant(TEXT_POOLS.detailSum[tier], questionRaw||'');
}

function genActionAdvice(cat, fortune, movingCount, hasChanged, questionRaw){
  var tier = fortune<=2 ? 't2' : fortune===3 ? 't3' : fortune===4 ? 't4' : fortune===5 ? 't5' : 't6';
  var adv = pickSmartVariant(TEXT_POOLS.action[tier], questionRaw||'');
  if(hasChanged) adv += '<br><br>🔄 事情还在变化中，别把今天的判断当成"铁板钉钉"。保持灵活，根据新情况随时调整。';
  if(movingCount===0) adv += '<br><br>📌 你的卦象非常稳定（没有动爻），说明短期内不会有大的变数。按你现在的计划走就行，不需要做大调整。';
  if(questionRaw && questionRaw.trim()) adv += '<br><br>💬 最后回到你的问题——别想太多，该做的做，该放的放。不管卦象怎么说，最终做决定的是你自己。卦只是给你一个参考角度，路还是你走的。加油 💪';
  return adv;
}

const HISTORY_KEY = 'liuyao_history';
const CAT_ICONS = {career:'🏛',love:'🎴',wealth:'🪙',health:'🏺',study:'📜',general:'☯'};

function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(e){ return []; }
}
function saveHistory(list){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }catch(e){}
}

function saveToHistory(){
  const hex = calcHexagram(state.lines);
  const data = H[hex.key];
  if(!data) return;
  const hasChanged = hex.changedKey && H[hex.changedKey];
  const changedData = hasChanged ? H[hex.changedKey] : null;
  const fortuneMap = {1:'大吉',2:'吉',3:'小吉',4:'平',5:'小凶',6:'凶'};
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const record = {
    id: now.getTime(),
    date: now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes()),
    category: state.category,
    catName: CAT_NAMES[state.category],
    question: state.question || '',
    hexKey: hex.key,
    hexNum: data[0],
    hexName: data[1],
    hexFullName: data[2],
    guaCi: data[3],
    xiangCi: data[4],
    fortune: data[7],
    fortuneText: fortuneMap[data[7]],
    changedKey: hex.changedKey,
    changedName: changedData ? changedData[2] : null,
    changedFortune: changedData ? changedData[7] : null,
    lines: state.lines.map(l=>({value:l.value,isYang:l.isYang,moving:l.moving})),
    movingLines: hex.movingLines
  };
  const list = loadHistory();
  list.unshift(record);
  if(list.length > 50) list.length = 50;
  saveHistory(list);
}

  const list = loadHistory();

    container.innerHTML = '<div class="history-empty">暂无摇爻记录<br>诚心一占，留下痕迹</div>';
    document.getElementById('btnClearHistory').style.display = 'none';

  const fortuneClass = {1:'ji',2:'ji',3:'ji',4:'ping',5:'xiong',6:'xiong'};

function deleteHistoryItem(id){

var audioCtx = null;
var soundOn = true;
var bgmTimer = null;
var bgmDrone = null;
var bgmGain = null;

function initAudio(){
  if(audioCtx) return;
  try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ return; }
}

function sfxClick(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1100, t);
  osc.frequency.exponentialRampToValueAtTime(700, t+0.07);
  g.gain.setValueAtTime(0.10, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.07);
  osc.start(t); osc.stop(t+0.07);
}

function sfxCoinToss(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var freqs = [2637, 3520, 4698];
  for(var i=0;i<freqs.length;i++){
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freqs[i];
    var d = i*0.025;
    g.gain.setValueAtTime(0.06, t+d);
    g.gain.exponentialRampToValueAtTime(0.001, t+d+0.35);
    osc.start(t+d); osc.stop(t+d+0.4);
  }
}

function sfxCoinLand(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var osc2 = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); osc2.connect(g); g.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(4200, t);
  osc.frequency.exponentialRampToValueAtTime(1800, t+0.10);
  osc2.type = 'sine';
  osc2.frequency.value = 3000;
  g.gain.setValueAtTime(0.09, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
  osc.start(t); osc2.start(t);
  osc.stop(t+0.15); osc2.stop(t+0.15);
}

function sfxTransition(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(600, t+0.15);
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
  osc.start(t); osc.stop(t+0.25);
}

function sfxReveal(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var notes = [523.25, 659.25, 783.99, 1046.50];
  for(var i=0;i<notes.length;i++){
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = notes[i];
    var d = i*0.12;
    g.gain.setValueAtTime(0, t+d);
    g.gain.linearRampToValueAtTime(0.07, t+d+0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t+d+0.8);
    osc.start(t+d); osc.stop(t+d+0.85);
  }
}

// Generative ambient BGM — pentatonic bell tones + low drone
function startBGM(){
  if(!soundOn || !audioCtx || bgmTimer) return;
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.045;
  bgmGain.connect(audioCtx.destination);

  bgmDrone = audioCtx.createOscillator();
  var dg = audioCtx.createGain();
  bgmDrone.connect(dg); dg.connect(bgmGain);
  bgmDrone.type = 'sine';
  bgmDrone.frequency.value = 130.81;
  dg.gain.value = 0.35;
  bgmDrone.start();

  var scale = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
  var lastIdx = -1;

  function playNote(){
    if(!soundOn || !bgmGain) return;
    var idx;
    do{ idx = Math.floor(Math.random()*scale.length); }while(idx===lastIdx);
    lastIdx = idx;
    var freq = scale[idx];
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(bgmGain);
    osc.type = Math.random()>0.5 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.25, t+0.06);
    g.gain.exponentialRampToValueAtTime(0.001, t+2.8);
    osc.start(t); osc.stop(t+3);
    bgmTimer = setTimeout(playNote, 1600+Math.random()*2400);
  }
  playNote();
}

function stopBGM(){
  if(bgmTimer){ clearTimeout(bgmTimer); bgmTimer=null; }
  if(bgmDrone){ try{bgmDrone.stop();}catch(e){} bgmDrone=null; }
  if(bgmGain){ try{bgmGain.disconnect();}catch(e){} bgmGain=null; }
}

function toggleSound(){
  soundOn = !soundOn;
  var btn = document.getElementById('soundToggle');
  btn.textContent = soundOn ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundOn);
  if(soundOn){
    initAudio();
    startBGM();
  } else {
    stopBGM();
  }
}

var INCENSE_HINTS = {
  4:{career:'此卦平平，诚心上香可添几分好运',love:'姻缘之事虽不明朗，焚香祈福或可柳暗花明',wealth:'财运平淡无奇，不妨上一炷香求个转机',health:'身体无大碍但也无余裕，上香祈福保平安',study:'学业平平，上香求个文运，或有惊喜',general:'运势不上不下，焚香改运求个好兆头'},
  5:{career:'此卦不太顺利，莫慌，随我上香化解',love:'感情有些波折，但诚心祈福可逢凶化吉',wealth:'财运有小阻碍，速来上香，财神自会眷顾',health:'身体略有不适之兆，上香祈福可保安康',study:'学业遇到小坎坷，焚香请文昌帝君助力',general:'运势小有波折，但上香改运可扭转乾坤'},
  6:{career:'此卦凶险，需诚心焚香禳灾，方保事业无虞',love:'感情有大波折，速来上香祈福，月老自会化解',wealth:'财运受阻严重，诚心上香可得财神护佑',health:'身体之兆令人忧，焚香祈福刻不容缓',study:'学业受挫之象，速焚香请文昌星君庇佑',general:'此卦不利，须虔诚上香方可转危为安'}
};

var incState = {lit:0, planted:false, smokeRaf:null};
var smokeParts = [], smokeCanvas, smokeCtx, smokeIntensity = 0;

function initIncense(){
  incState = {lit:0, planted:false, smokeRaf:null};
  smokeParts = []; smokeIntensity = 0;
  document.querySelectorAll('#stage-incense .inc-step').forEach(function(s){s.classList.remove('active')});
  document.getElementById('incStep1').classList.add('active');
  document.querySelectorAll('.inc-stick').forEach(function(s){s.classList.remove('lit')});
  document.querySelectorAll('.burner-stick-item').forEach(function(s){s.classList.remove('planted')});
  document.getElementById('wishInput').value = '';
  document.getElementById('wishError').style.display = 'none';
  smokeCanvas = document.getElementById('smokeCanvas');
  if(smokeCanvas){
    var par = smokeCanvas.parentElement;
    smokeCanvas.width = par.offsetWidth || 480;
    smokeCanvas.height = par.offsetHeight || 600;
    smokeCtx = smokeCanvas.getContext('2d');
  }
  if(incState.smokeRaf) cancelAnimationFrame(incState.smokeRaf);
  drawSmoke();
}
function lightStick(idx){
  var sticks = document.querySelectorAll('.inc-stick');
  if(sticks[idx].classList.contains('lit')) return;
  sticks[idx].classList.add('lit');
  sfxClick();
  incState.lit++;
  if(incState.lit >= 3) setTimeout(function(){ goIncStep(2); }, 800);
}
function goIncStep(n){
  document.querySelectorAll('#stage-incense .inc-step').forEach(function(s){s.classList.remove('active')});
  var id = n===2?'incStep2':n===3?'incStep3':'incStepResult';
  document.getElementById(id).classList.add('active');
}
function plantIncense(){
  if(incState.planted) return;
  incState.planted = true;
  sfxClick();
  var sticks = document.querySelectorAll('.burner-stick-item');
  sticks.forEach(function(s,i){ setTimeout(function(){ s.classList.add('planted'); }, i*300); });
  smokeIntensity = 0.8;
  setTimeout(function(){ goIncStep(3); }, 1800);
}
function submitWish(){
  var w = document.getElementById('wishInput').value.trim();
  if(!w){ document.getElementById('wishError').style.display = 'block'; return; }
  document.getElementById('wishError').style.display = 'none';
  sfxTransition();
  buildIncenseResult(w);
  goIncStep(4);
}
function buildIncenseResult(wish){
  var hex = calcHexagram(state.lines);
  var data = H[hex.key];
  var fortune = data ? data[7] : 4;
  var cat = state.category;
  var deity = DEITY[cat]||{};
  var pool = REMEDY_POOL[cat];
  if(!pool) return;
  var remedy = pool.remedy[Math.floor(Math.random()*pool.remedy.length)];
  var lucky = pool.lucky.join(' · ');
  var closing = pool.closing[Math.floor(Math.random()*pool.closing.length)];
  var h = '';
  if(deity.name){
    h += '<div class="deity-speech"><div class="deity-speech-head">'
      +'<div class="deity-speech-icon dc-avatar" style="background-image:url('+DEITY_IMG[cat]+');background-size:cover;background-position:center"></div>'
      +'<div><div class="deity-speech-name">'+deity.name+'</div>'
      +'<div class="deity-speech-tag">为你化解指引</div></div></div>'
      +'<p>你的诚心我已感应到，这是我为你指的明路——</p></div>';
  }
  h += '<div class="wish-echo">「'+esc(wish)+'」</div>';
  h += '<div class="remedy-block"><div class="remedy-title">化 解 之 道</div><div class="remedy-content">'+remedy+'</div></div>';
  h += '<div class="remedy-block"><div class="remedy-title">吉 祥 指 引</div><div class="remedy-content">'+lucky+'</div></div>';
  if(deity.name){
    h += '<div class="deity-speech" style="margin-top:20px"><div class="deity-speech-head">'
      +'<div class="deity-speech-icon dc-avatar" style="background-image:url('+DEITY_IMG[cat]+');background-size:cover;background-position:center"></div>'
      +'<div><div class="deity-speech-name">'+deity.name+'</div>'
      +'<div class="deity-speech-tag">寄语</div></div></div>'
      +'<p>'+closing+'</p></div>';
  }
  document.getElementById('incenseResultContent').innerHTML = h;
  smokeIntensity = 0.15;
}
function drawSmoke(){
  if(!smokeCtx){incState.smokeRaf=requestAnimationFrame(drawSmoke);return;}
  smokeCtx.clearRect(0,0,smokeCanvas.width,smokeCanvas.height);
  if(smokeIntensity > 0 && Math.random() < smokeIntensity*0.3){
    var cx = smokeCanvas.width/2;
    smokeParts.push({x:cx+(Math.random()-.5)*40,y:smokeCanvas.height*0.5,vx:(Math.random()-.5)*.5,vy:-.5-Math.random()*1.5,r:3+Math.random()*8,life:1,decay:.003+Math.random()*.005});
  }
  for(var i=smokeParts.length-1;i>=0;i--){
    var p=smokeParts[i];
    p.x+=p.vx+(Math.random()-.5)*.3;p.y+=p.vy;p.r+=.1;p.life-=p.decay;
    if(p.life<=0){smokeParts.splice(i,1);continue;}
    smokeCtx.beginPath();smokeCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    smokeCtx.fillStyle='rgba(200,190,170,'+(p.life*.15*smokeIntensity)+')';
    smokeCtx.fill();
  }
  incState.smokeRaf=requestAnimationFrame(drawSmoke);
}

function restart(){
  state = {category:'',question:'',round:0,lines:[],casting:false};
  if(incState.smokeRaf){cancelAnimationFrame(incState.smokeRaf);incState.smokeRaf=null;}
  smokeIntensity=0;smokeParts=[];
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('questionInput').value = '';
  document.getElementById('questionArea').classList.remove('show');
  var btn = document.getElementById('btnConfirmCat');
  btn.classList.remove('btn-enabled');
  btn.classList.add('btn-disabled');
  goToStage('welcome');
}

// Set deity avatar images
function setAvatarBg(el, cat){
  if(!DEITY_IMG[cat]) return;
  el.style.backgroundImage = 'url('+DEITY_IMG[cat]+')';
  el.style.backgroundSize = 'cover';
  el.style.backgroundPosition = 'center';
}
function initDeityAvatars(){
  document.querySelectorAll('.dc-avatar[data-cat]').forEach(function(el){ setAvatarBg(el, el.getAttribute('data-cat')); });
  document.querySelectorAll('.cat-card .icon[data-cat]').forEach(function(el){ setAvatarBg(el, el.getAttribute('data-cat')); });
}
initDeityAvatars();
</script>
