// ================= CORE LOGIC =================
function getTrigramIndex(l1,l2,l3){ return (l3<<2)|(l2<<1)|l1; }

function calcHexagram(lines){
  const vals = lines.map(l=>l.value);
  const lower = getTrigramIndex(vals[0]&1, vals[1]&1, vals[2]&1);
  const upper = getTrigramIndex(vals[3]&1, vals[4]&1, vals[5]&1);
  const key = lower+'_'+upper;
  const movingLines = [];
  lines.forEach((l,i)=>{ if(l.moving) movingLines.push(i); });
  let changedKey = null;
  if(movingLines.length > 0){
    const changed = vals.map((v,i)=> lines[i].moving ? (v&1?0:1) : (v&1));
    const cL = getTrigramIndex(changed[0], changed[1], changed[2]);
    const cU = getTrigramIndex(changed[3], changed[4], changed[5]);
    changedKey = cL+'_'+cU;
  }
  return { key, changedKey, movingLines, lower, upper };
}

function tossCoin(){ return Math.random() < 0.5 ? 3 : 2; }
function tossThreeCoins(){
  const c = [tossCoin(), tossCoin(), tossCoin()];
  const sum = c[0]+c[1]+c[2];
  return { coins:c, sum, value:(sum===6||sum===8)?0:1, isYang:sum===7||sum===9, moving:sum===6||sum===9 };
}

// ================= UI LOGIC =================
function goToStage(name){
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('stage-'+name);
  el.classList.add('active');
  document.getElementById('app').scrollTop = 0;
  sfxTransition();
  if(name==='casting') initCasting();
  if(name==='reveal'){ buildReveal(); sfxReveal(); }
  if(name==='result') buildResult();
  if(name==='history') buildHistoryList();
}

function selectCat(el){
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  state.category = el.dataset.cat;
  document.getElementById('questionArea').classList.add('show');
  var btn = document.getElementById('btnConfirmCat');
  btn.classList.remove('btn-disabled');
  btn.classList.add('btn-enabled');
}
function confirmCat(){
  if(!state.category) return;
  state.question = (document.getElementById('questionInput').value||'').trim();
  goToStage('casting');
}

function initCasting(){
  state.round=0; state.lines=[]; state.casting=false;
  document.getElementById('castRound').textContent = ROUND_NAMES[0];
  document.getElementById('yaoProgress').innerHTML = '';
  document.getElementById('castResult').classList.remove('show');
  document.getElementById('castResult').textContent = '';
  document.getElementById('btnCast').style.display = '';
  document.getElementById('btnQuickCast').style.display = '';
  const extra = document.querySelector('#stage-casting .btn-small.view-result-btn');
  if(extra) extra.remove();
  resetCoins();
}

function resetCoins(){
  for(var i=0;i<3;i++){
    var coin = document.getElementById('coin'+i);
    coin.style.animation = 'none';
    void coin.offsetHeight;
  }
  document.getElementById('castResult').classList.remove('show');
}

function castCoins(){
  if(state.casting || state.round >= 6) return;
  state.casting = true;
  document.getElementById('btnQuickCast').style.display = 'none';
  resetCoins();
  var result = tossThreeCoins();
  sfxCoinToss();
  for(var i=0;i<3;i++){
    var coin = document.getElementById('coin'+i);
    var isFront = result.coins[i] === 3;
    coin.style.setProperty('--fr', isFront ? '1800deg' : '1980deg');
    coin.style.animation = 'coinToss 1.2s cubic-bezier(0.22,1,0.36,1) forwards';
  }
  setTimeout(function(){
    sfxCoinLand();
    state.lines.push(result);
    state.round++;
    var resultEl = document.getElementById('castResult');
    var heads = result.coins.filter(function(c){return c===3;}).length;
    var typeStr = '';
    if(result.sum===6) typeStr = '老阴 ⚋  动爻·变阳';
    else if(result.sum===7) typeStr = '少阳 ⚊';
    else if(result.sum===8) typeStr = '少阴 ⚋';
    else typeStr = '老阳 ⚊  动爻·变阴';
    resultEl.textContent = heads+'正'+(3-heads)+'反 · '+typeStr;
    resultEl.classList.add('show');
    addYaoLine(result, state.round);
    if(state.round < 6){
      document.getElementById('castRound').textContent = ROUND_NAMES[state.round];
      state.casting = false;
    } else {
      showCastComplete();
    }
  }, 1300);
}

function showCastComplete(){
  document.getElementById('btnCast').style.display = 'none';
  document.getElementById('btnQuickCast').style.display = 'none';
  setTimeout(function(){
    document.getElementById('castRound').textContent = '摇 卦 完 成';
    var btn = document.createElement('button');
    btn.className = 'btn btn-small view-result-btn';
    btn.textContent = '查看卦象';
    btn.onclick = function(){ goToStage('reveal'); };
    document.querySelector('.cast-btns').appendChild(btn);
    state.casting = false;
  }, 500);
}

function quickCast(){
  if(state.casting || state.round >= 6) return;
  state.casting = true;
  document.getElementById('btnCast').style.display = 'none';
  document.getElementById('btnQuickCast').style.display = 'none';

  for(var i=0;i<6;i++) state.lines.push(tossThreeCoins());

  var step = 0;
  function showNext(){
    if(step >= 6){
      state.round = 6;
      showCastComplete();
      return;
    }
    resetCoins();
    var result = state.lines[step];
    sfxCoinToss();
    for(var i=0;i<3;i++){
      var coin = document.getElementById('coin'+i);
      var isFront = result.coins[i] === 3;
      coin.style.setProperty('--fr', isFront ? '1800deg' : '1980deg');
      coin.style.animation = 'coinToss 0.65s cubic-bezier(0.22,1,0.36,1) forwards';
    }
    setTimeout(function(){
      sfxCoinLand();
      state.round = step + 1;
      document.getElementById('castRound').textContent = ROUND_NAMES[Math.min(step, 5)];
      var resultEl = document.getElementById('castResult');
      var heads = result.coins.filter(function(c){return c===3;}).length;
      var typeStr = '';
      if(result.sum===6) typeStr = '老阴 ⚋  动爻·变阳';
      else if(result.sum===7) typeStr = '少阳 ⚊';
      else if(result.sum===8) typeStr = '少阴 ⚋';
      else typeStr = '老阳 ⚊  动爻·变阴';
      resultEl.textContent = heads+'正'+(3-heads)+'反 · '+typeStr;
      resultEl.classList.add('show');
      addYaoLine(result, step + 1);
      step++;
      setTimeout(showNext, 350);
    }, 700);
  }
  showNext();
}

function addYaoLine(result, round){
  const container = document.getElementById('yaoProgress');
  const div = document.createElement('div');
  div.className = 'yao-line';
  const numSpan = document.createElement('span');
  numSpan.className = 'yao-num';
  numSpan.textContent = ['初','二','三','四','五','上'][round-1];
  div.appendChild(numSpan);
  if(result.isYang){
    const bar = document.createElement('div');
    bar.className = 'yang' + (result.moving?' moving':'');
    div.appendChild(bar);
  } else {
    const yin = document.createElement('div');
    yin.className = 'yin' + (result.moving?' moving':'');
    yin.innerHTML = '<span></span><span></span>';
    div.appendChild(yin);
  }
  const dot = document.createElement('span');
  dot.className = result.moving ? 'moving-dot' : 'stable-dot';
  div.appendChild(dot);
  container.appendChild(div);
}

function buildReveal(){
  const hex = calcHexagram(state.lines);
  const data = H[hex.key];
  if(!data) return;
  const hasChanged = hex.changedKey && H[hex.changedKey];
  const changedData = hasChanged ? H[hex.changedKey] : null;
  let html = `<div class="cat-title" style="margin-bottom:4px">卦 象</div>
    <div class="cat-sub">${CAT_NAMES[state.category]}占</div><div class="divider"></div>`;
  html += `<div class="gua-display">`;
  html += buildGuaBox('本卦', data, hex.key, state.lines, false);
  if(hasChanged){
    html += `<div class="arrow">➜</div>`;
    const cLines = state.lines.map(l=>({...l,
      value: l.moving?(l.value&1?0:1):l.value,
      isYang: l.moving?!l.isYang:l.isYang, moving:false}));
    html += buildGuaBox('变卦', changedData, hex.changedKey, cLines, true);
  }
  html += `</div>`;
  html += `<div class="gua-xiang">象曰：${data[4]}</div>`;
  document.getElementById('revealContent').innerHTML = html;
}

function buildGuaBox(label, data, key, lines, isChanged){
  const parts = key.split('_');
  const lower = parseInt(parts[0]), upper = parseInt(parts[1]);
  let html = `<div class="gua-box"><div class="gua-label">${label}</div>
    <div class="gua-name">${data[1]}</div>
    <div class="gua-fullname">${data[2]}</div><div class="gua-lines">`;
  for(let i=0;i<6;i++){
    const isYang = lines[i].isYang || (lines[i].value&1)===1;
    const m = !isChanged && lines[i].moving;
    if(isYang) html += `<div class="yang${m?' moving':''}"></div>`;
    else html += `<div class="yin${m?' moving':''}"><span></span><span></span></div>`;
  }
  html += `</div><div class="tri-label">上${TRI[upper].nat}${TRI[upper].name} · 下${TRI[lower].nat}${TRI[lower].name}</div></div>`;
  return html;
}

}

function genActionAdvice(cat, fortune, movingCount, hasChanged, questionRaw){
  var tier = fortune<=2 ? 't2' : fortune===3 ? 't3' : fortune===4 ? 't4' : fortune===5 ? 't5' : 't6';
  var adv = pickSmartVariant(TEXT_POOLS.action[tier], questionRaw||'');
  if(hasChanged) adv += '<br><br>🔄 事情还在变化中，别把今天的判断当成"铁板钉钉"。保持灵活，根据新情况随时调整。';
  if(movingCount===0) adv += '<br><br>📌 你的卦象非常稳定（没有动爻），说明短期内不会有大的变数。按你现在的计划走就行，不需要做大调整。';
  if(questionRaw && questionRaw.trim()) adv += '<br><br>💬 最后回到你的问题——别想太多，该做的做，该放的放。不管卦象怎么说，最终做决定的是你自己。卦只是给你一个参考角度，路还是你走的。加油 💪';
  return adv;
}


// ================= HISTORY =================
const HISTORY_KEY = 'liuyao_history';
const CAT_ICONS = {career:'🏛',love:'🎴',wealth:'🪙',health:'🏺',study:'📜',general:'☯'};

function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(e){ return []; }
}
function saveHistory(list){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }catch(e){}
}

function saveToHistory(){
  const hex = calcHexagram(state.lines);
  const data = H[hex.key];
  if(!data) return;
  const hasChanged = hex.changedKey && H[hex.changedKey];
  const changedData = hasChanged ? H[hex.changedKey] : null;
  const fortuneMap = {1:'大吉',2:'吉',3:'小吉',4:'平',5:'小凶',6:'凶'};
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const record = {
    id: now.getTime(),
    date: now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes()),
    category: state.category,
    catName: CAT_NAMES[state.category],
    question: state.question || '',
    hexKey: hex.key,
    hexNum: data[0],
    hexName: data[1],
    hexFullName: data[2],
    guaCi: data[3],
    xiangCi: data[4],
    fortune: data[7],
    fortuneText: fortuneMap[data[7]],
    changedKey: hex.changedKey,
    changedName: changedData ? changedData[2] : null,
    changedFortune: changedData ? changedData[7] : null,
    lines: state.lines.map(l=>({value:l.value,isYang:l.isYang,moving:l.moving})),
    movingLines: hex.movingLines
  };
  const list = loadHistory();
  list.unshift(record);
  if(list.length > 50) list.length = 50;
  saveHistory(list);
}

function buildHistoryList(){
  const list = loadHistory();
  const container = document.getElementById('historyContainer');
  if(list.length === 0){
    container.innerHTML = '<div class="history-empty">暂无摇爻记录<br>诚心一占，留下痕迹</div>';
    document.getElementById('btnClearHistory').style.display = 'none';
    return;
  }
  document.getElementById('btnClearHistory').style.display = '';
  const fortuneClass = {1:'ji',2:'ji',3:'ji',4:'ping',5:'xiong',6:'xiong'};
  const fortuneMap = {1:'大吉',2:'吉',3:'小吉',4:'平',5:'小凶',6:'凶'};
  let html = '<div class="history-list">';
  list.forEach(function(r){
    const fc = fortuneClass[r.fortune] || 'ping';
    var qPreview = r.question ? '<div class="hc-meta" style="color:var(--ink);opacity:0.5;margin-top:2px">"'+esc(r.question).substring(0,30)+(r.question.length>30?'…':'')+'"</div>' : '';
    html += '<div class="history-card" onclick="viewHistoryDetail('+r.id+')">'
      +'<div class="hc-icon">'+(CAT_ICONS[r.category]||'☯')+'</div>'
      +'<div class="hc-body">'
      +'<div class="hc-name">'+r.hexFullName+'</div>'
      +'<div class="hc-meta">'+r.date+' · '+r.catName+(r.changedName?' → '+r.changedName:'')+'</div>'
      +qPreview
      +'</div>'
      +'<div class="hc-fortune fortune-'+fc+'">'+(fortuneMap[r.fortune]||'平')+'</div>'
      +'<button class="hc-delete" onclick="event.stopPropagation();deleteHistoryItem('+r.id+')" title="删除">✕</button>'
      +'</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function viewHistoryDetail(id){
  const list = loadHistory();
  const r = list.find(function(item){ return item.id === id; });
  if(!r) return;
  const data = H[r.hexKey];
  if(!data) return;
  const ci = CAT_IDX[r.category];
  const hasChanged = r.changedKey && H[r.changedKey];
  const changedData = hasChanged ? H[r.changedKey] : null;
  const fortuneMap = {1:'大吉',2:'吉',3:'小吉',4:'平',5:'小凶',6:'凶'};
  const fortuneClass = {1:'ji',2:'ji',3:'ji',4:'ping',5:'xiong',6:'xiong'};
  const fortune = data[7];

  var blocks = [];
  blocks.push({title:'卦名与卦辞',
    content:'<p><strong>第'+data[0]+'卦 · '+data[2]+'</strong></p><p>'+data[3]+'</p><p style="color:var(--ink2);font-size:0.85em">象曰：'+data[4]+'</p>'});
  if(r.movingLines && r.movingLines.length > 0){
    var yh = '<p>动爻解读：</p>';
    var yp = ['初爻','二爻','三爻','四爻','五爻','上爻'];
    r.movingLines.forEach(function(i){
      var isYang = r.lines[i] && r.lines[i].isYang;
      yh += '<p><strong>'+yp[i]+'</strong>（'+(isYang?'老阳→变阴':'老阴→变阳')+'）：'+data[6][i]+'</p>';
    });
    if(hasChanged) yh += '<p style="margin-top:12px"><strong>变卦：第'+changedData[0]+'卦 · '+changedData[2]+'</strong></p><p>'+changedData[3]+'</p>';
    blocks.push({title:'动爻与变卦', content:yh});
  }
  blocks.push({title:r.catName+'运势',
    content:'<p>'+data[5][ci]+'</p>'+(hasChanged?'<p style="margin-top:10px;color:var(--ink2)">变卦提示：'+changedData[5][ci]+'</p>':'')});
  var oh = '<div style="text-align:center;margin:12px 0"><span class="fortune-badge fortune-'+fortuneClass[fortune]+'">'+fortuneMap[fortune]+'</span></div><p>';
  if(fortune<=2) oh+='此卦大吉，所问之事顺遂亨通。';
  else if(fortune===3) oh+='此卦小吉，所问之事大体顺利。';
  else if(fortune===4) oh+='此卦平稳，所问之事不好不坏。';
  else if(fortune===5) oh+='此卦小凶，所问之事略有阻碍。';
  else oh+='此卦不利，所问之事多有困难。';
  oh+='</p>';
  blocks.push({title:'综合断语', content:oh});

  var html = '<div class="result-header">'+data[2]+'</div>'
    +'<div class="result-sub">'+r.date+' · '+r.catName+'占</div>';
  if(r.question) html += '<div class="user-question-display">"'+esc(r.question)+'"</div>';
  html += '<div class="divider" style="margin-bottom:36px"></div>';
  blocks.forEach(function(b,i){
    html += '<div class="result-block" data-delay="'+i+'">'
      +'<div class="result-title">'+b.title+'</div><div class="result-content">'+b.content+'</div></div>';
  });
  document.getElementById('historyDetailContent').innerHTML = html;
  goToStage('historyDetail');
  setTimeout(function(){
    document.querySelectorAll('#historyDetailContent .result-block').forEach(function(el,i){
      setTimeout(function(){ el.classList.add('show'); }, 200 + i*400);
    });
  }, 100);
}

function deleteHistoryItem(id){
  var list = loadHistory().filter(function(item){ return item.id !== id; });
  saveHistory(list);
  buildHistoryList();
}

function clearHistory(){
  if(!confirm('确定清空所有摇爻记录？')) return;
  saveHistory([]);
  buildHistoryList();
}

}

// ================= AUDIO SYSTEM =================
var audioCtx = null;
var soundOn = true;
var bgmTimer = null;
var bgmDrone = null;
var bgmGain = null;

function initAudio(){
  if(audioCtx) return;
  try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ return; }
}

function sfxClick(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1100, t);
  osc.frequency.exponentialRampToValueAtTime(700, t+0.07);
  g.gain.setValueAtTime(0.10, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.07);
  osc.start(t); osc.stop(t+0.07);
}

function sfxCoinToss(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var freqs = [2637, 3520, 4698];
  for(var i=0;i<freqs.length;i++){
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freqs[i];
    var d = i*0.025;
    g.gain.setValueAtTime(0.06, t+d);
    g.gain.exponentialRampToValueAtTime(0.001, t+d+0.35);
    osc.start(t+d); osc.stop(t+d+0.4);
  }
}

function sfxCoinLand(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var osc2 = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); osc2.connect(g); g.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(4200, t);
  osc.frequency.exponentialRampToValueAtTime(1800, t+0.10);
  osc2.type = 'sine';
  osc2.frequency.value = 3000;
  g.gain.setValueAtTime(0.09, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
  osc.start(t); osc2.start(t);
  osc.stop(t+0.15); osc2.stop(t+0.15);
}

function sfxTransition(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(600, t+0.15);
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
  osc.start(t); osc.stop(t+0.25);
}

function sfxReveal(){
  if(!soundOn || !audioCtx) return;
  var t = audioCtx.currentTime;
  var notes = [523.25, 659.25, 783.99, 1046.50];
  for(var i=0;i<notes.length;i++){
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = notes[i];
    var d = i*0.12;
    g.gain.setValueAtTime(0, t+d);
    g.gain.linearRampToValueAtTime(0.07, t+d+0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t+d+0.8);
    osc.start(t+d); osc.stop(t+d+0.85);
  }
}

// Generative ambient BGM — pentatonic bell tones + low drone
function startBGM(){
  if(!soundOn || !audioCtx || bgmTimer) return;
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.045;
  bgmGain.connect(audioCtx.destination);

  bgmDrone = audioCtx.createOscillator();
  var dg = audioCtx.createGain();
  bgmDrone.connect(dg); dg.connect(bgmGain);
  bgmDrone.type = 'sine';
  bgmDrone.frequency.value = 130.81;
  dg.gain.value = 0.35;
  bgmDrone.start();

  var scale = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
  var lastIdx = -1;

  function playNote(){
    if(!soundOn || !bgmGain) return;
    var idx;
    do{ idx = Math.floor(Math.random()*scale.length); }while(idx===lastIdx);
    lastIdx = idx;
    var freq = scale[idx];
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(bgmGain);
    osc.type = Math.random()>0.5 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.25, t+0.06);
    g.gain.exponentialRampToValueAtTime(0.001, t+2.8);
    osc.start(t); osc.stop(t+3);
    bgmTimer = setTimeout(playNote, 1600+Math.random()*2400);
  }
  playNote();
}

function stopBGM(){
  if(bgmTimer){ clearTimeout(bgmTimer); bgmTimer=null; }
  if(bgmDrone){ try{bgmDrone.stop();}catch(e){} bgmDrone=null; }
  if(bgmGain){ try{bgmGain.disconnect();}catch(e){} bgmGain=null; }
}

function toggleSound(){
  soundOn = !soundOn;
  var btn = document.getElementById('soundToggle');
  btn.textContent = soundOn ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundOn);
  if(soundOn){
    initAudio();
    startBGM();
  } else {
    stopBGM();
  }
}

// Auto-init audio on first interaction
document.addEventListener('click', function _initOnce(){
  initAudio();
  if(soundOn) startBGM();
  document.removeEventListener('click', _initOnce, true);
}, true);

// Hook click sounds to all buttons
document.addEventListener('click', function(e){
  if(e.target.closest('button,.btn,.cat-card')) sfxClick();
}, true);

function restart(){
  state = {category:'',question:'',round:0,lines:[],casting:false};
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('questionInput').value = '';
  document.getElementById('questionArea').classList.remove('show');
  var btn = document.getElementById('btnConfirmCat');
  btn.classList.remove('btn-enabled');
  btn.classList.add('btn-disabled');
  goToStage('welcome');
}
